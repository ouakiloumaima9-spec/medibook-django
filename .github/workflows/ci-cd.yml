name: MediBook CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medibook_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DEBUG: "True"
      SECRET_KEY: github-actions-secret-key-medibook-2026
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: medibook_test
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      CSRF_TRUSTED_ORIGINS: http://localhost

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test --verbosity=2

      - name: Build Docker image
        run: docker build -t medibook:${{ github.sha }} .

      - name: Login to Docker Hub
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          username: omoumou
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push Docker image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          docker tag medibook:${{ github.sha }} omoumou/medibook2:latest
          docker tag medibook:${{ github.sha }} omoumou/medibook2:${{ github.sha }}
          docker push omoumou/medibook2:latest
          docker push omoumou/medibook2:${{ github.sha }}