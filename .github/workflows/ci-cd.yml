name: MediBook CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medibook_test
          MYSQL_USER: medibook_user
          MYSQL_PASSWORD: medibook_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DEBUG: "False"
      SECRET_KEY: github-actions-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: medibook_test
      DB_USER: medibook_user
      DB_PASSWORD: medibook_pass
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      CSRF_TRUSTED_ORIGINS: http://localhost
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev pkg-config
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Django checks
        run: python manage.py check --deploy
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Run tests
        run: python manage.py test
      - name: Build Docker image
        run: docker build -t medibook:${{ github.sha }} .
      - name: Login to Docker Hub
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push Docker image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.DOCKERHUB_USERNAME != ''
        run: |
          docker tag medibook:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/medibook:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/medibook:latest
