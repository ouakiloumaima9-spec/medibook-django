<div class="table-responsive">
<table class="table align-middle">
  <thead><tr><th>Date</th><th>Patient</th><th>Médecin</th><th>Spécialité</th><th>Statut</th><th></th></tr></thead>
  <tbody>
  {% for a in appointments %}
  <tr>
    <td>{{ a.date|date:"d/m/Y" }} {{ a.time|time:"H:i" }}</td>
    <td>{{ a.patient.get_full_name|default:a.patient.username }}</td>
    <td>{{ a.doctor }}</td>
    <td>{{ a.specialty.name|default:"-" }}</td>
    <td><span class="badge {{ a.status_badge_class }}">{{ a.get_status_display }}</span></td>
    <td><a href="{% url 'appointments:detail' a.pk %}" class="btn btn-sm btn-mb-outline">Voir</a></td>
  </tr>
  {% empty %}
  <tr><td colspan="6" class="text-center text-muted py-4">Aucun rendez-vous.</td></tr>
  {% endfor %}
  </tbody>
</table>
</div>
