{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="mb-card">
      <h3 class="text-center mb-4">Créer un compte patient</h3>
      <form method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-mb-primary w-100 mt-3">S'inscrire</button>
      </form>
      <p class="text-center mt-3 text-muted">Déjà inscrit ? <a href="{% url 'accounts:login' %}">Se connecter</a></p>
    </div>
  </div>
</div>
{% endblock %}
