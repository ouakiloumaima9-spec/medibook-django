{% extends 'base.html' %}
{% block content %}
<h3 class="mb-4">Toutes les spécialités</h3>
<div class="row g-3">{% for specialty in specialties %}<div class="col-md-4 col-lg-3"><a href="{% url 'doctors:list' %}?specialty={{ specialty.id }}" class="specialty-card"><div class="specialty-icon"><i class="bi {{ specialty.icon }}"></i></div><div class="fw-semibold">{{ specialty.name }}</div><p class="small text-muted mt-2">{{ specialty.description|truncatewords:10 }}</p></a></div>{% empty %}<p class="text-muted">Aucune spécialité disponible.</p>{% endfor %}</div>
{% endblock %}
