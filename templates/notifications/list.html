{% extends 'base.html' %}
{% block content %}<div class="mb-card"><h3 class="mb-3">Notifications</h3>{% for notification in notifications %}<div class="border-bottom py-3"><div class="fw-semibold">{{ notification.title }}</div><div class="text-muted small">{{ notification.message }}</div><div class="text-muted small mt-1">{{ notification.created_at|date:"d/m/Y H:i" }}</div></div>{% empty %}<p class="text-muted">Aucune notification.</p>{% endfor %}</div>{% endblock %}
